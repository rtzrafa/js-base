<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 11b: Gerador de Citações</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #645b5b;
    }

    #quote {
      font-size: 1.5rem;
      margin-bottom: 20px;
      text-align: center;
      max-width: 600px;
    }

    button {
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #d92017;
      color: rgb(248, 248, 248);
    }

    button:hover {
      background-color: #d92017;
    }
  </style>
</head>
<body>
  <!-- Parágrafo para exibir a citação -->
  <p id="quote">Clique no botão para gerar uma citação.</p>

  <!-- Botão para gerar uma nova citação -->
  <button id="newQuoteButton">Nova Citação</button>

  <!-- Script JavaScript embutido na página -->
  <script>
    // Array de citações
    const quotes = [
      "A vida é o que acontece enquanto você está ocupado fazendo outros planos. – John Lennon",
      "A simplicidade é o último grau de sofisticação. – Leonardo da Vinci",
      "O sucesso é a soma de pequenos esforços repetidos dia após dia. – Robert Collier",
      "Acredite que você pode e você já está no meio do caminho. – Theodore Roosevelt",
      "A melhor maneira de prever o futuro é criá-lo. – Peter Drucker",
      " Eu sonho com a minha pintura e depois pinto o meu sonho. - Van Gogh",
      " O homem não é nada além daquilo que a educação faz dele. - Kant",
      " E lembre-se, com grandes poderes vêm grandes responsabilidades. - Peter Parker",  
    ];

    // Seleciona o parágrafo e o botão
    const quoteText = document.getElementById("quote");
    const button = document.getElementById("newQuoteButton");

    // Função para gerar uma citação aleatória
    function gerarCitacao() {
      const indiceAleatorio = Math.floor(Math.random() * quotes.length);
      quoteText.textContent = quotes[indiceAleatorio];
    }

    // Evento de clique no botão
    button.addEventListener("click", gerarCitacao);

  </script>
</body>
</html>
